    <script type="text/javascript">
      //slider popup
      var slideActive = 1;
      showPopup(slideActive);

      function plusDivs(n) {
        showPopup((slideActive += n));
      }

      function showPopup(n) {
        var i;
        var x = document.getElementsByClassName("slidePopup");
        if (n > x.length) {
          slideActive = 1;
        }
        if (n < 1) {
          slideActive = x.length;
        }
        for (i = 0; i < x.length; i++) {
          x[i].style.display = "none";
        }
        x[slideActive - 1].style.display = "block";
      }
    </script>

    <script type="text/javascript">
      //slider auto change//
      var slideActive = 0;
      carousel();

      function carousel() {
        var i;
        var x = document.getElementsByClassName("slidePopup");
        for (i = 0; i < x.length; i++) {
          x[i].style.display = "none";
        }
        slideActive++;
        if (slideActive > x.length) {
          slideActive = 1;
        }
        x[slideActive - 1].style.display = "block";
        setTimeout(carousel, 2000); // Change image every 2 seconds
      }
    </script>
